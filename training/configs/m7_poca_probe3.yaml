# THROWAWAY discriminator (M7 Task 7a). Fork of m7_poca_probe2.yaml.
# Question: is soft-C1 (door closed, plate beside doorway, 30s->4s competence-ramped dwell) truly ZERO-success
# structurally, or does it just need a resumed policy + more steps? Resumes from the C0-competent checkpoint
# (m7_p1e, 300k, initialize-from) and pins coop_difficulty=1.0 / arm_mode=2.0 from step 0 — no curriculum, no C0
# re-ramp. All hyperparameters / network / reward_signals byte-identical to m7_poca_probe2.yaml.
# Budget max_steps=400000, checkpoint_interval=100000.
behaviors:
  CoopAgent:
    trainer_type: poca
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # normalizes the vector + ray observations (no visual obs on the coop arms)
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical across all 3 arms)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 400000        # THROWAWAY discriminator budget
    time_horizon: 64
    summary_freq: 20000

# Constant per-arm routing selector (CoopArena.DecodeArm reads env-param "arm_mode"; ArmRouting.Arm.Poca=2).
environment_parameters:
  arm_mode: 2.0
  # Constant C1 from step 0 — no curriculum. Resumed policy (initialize-from m7_p1e) already knows locomotion +
  # goal-reaching from C0; this probe asks only whether the tap-then-transit chain is reachable under soft-C1.
  coop_difficulty: 1.0
