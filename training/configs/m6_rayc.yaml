# M6 rayC arm: PPO + MLP (over the three M5 ray fans + the 8-float vector obs) + LSTM. NO RND (M5 settled it).
# The goal-bearing fans detect PER-COLOR tags goal_c0..goal_c4 (tagGoalsByColor=true in Training_rayc.unity), so
# rayC is HAND-TOLD the color categories -> it solves the cued-color task, but only via categories a human wired
# in (the declared steelman). Its wider ray obs (goal -> 5 tags) IS the manipulation, not a confound. Perception
# is the ONLY lever vs pixel/ray1; LSTM is held ON and identical across arms; the 8-float cue is given to every arm.
# Byte-identical to m6_ray1.yaml (the sensor difference lives in the scene, not the config) — kept separate for
# run-id clarity.
behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # normalizes the vector + ray observations (no visual obs on the ray arms)
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical across all 3 arms)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 3000000       # provisional (equal across arms); the Phase-5 probe pins it
    time_horizon: 64
    summary_freq: 20000

# Deterministic PROGRESS curriculum (reward-threshold lessons were unusable in M4). STRUCTURE ramps L0 open/flat
# -> L3 hidden + elevated + crowded + pits; the RGB cue + 3-goal triad ride on top at every level. BREAKPOINTS
# are PLACEHOLDERS (0.10/0.30/0.50) -> the Phase-5 probe re-calibrates them. Identical across all 3 arms (fair ablation).
environment_parameters:
  difficulty:
    curriculum:
      - name: L0_open_flat
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.20
        value: 0.0
      - name: L1_behind_walls
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.40
        value: 1.0
      - name: L2_platform_pits
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.65
        value: 2.0
      - name: L3_hidden_elevated_crowded
        value: 3.0
