# EXTENSION #1 (night contract): warm-start from showcase_s0 via --initialize-from; jumpPenalty UNCHANGED 0.02.
# Rehearsal curriculum: L0-L2 pass quickly (100k each, forgetting guard), then ~800k dwell EACH on the two
# failing stages (L3 gap 0.60, L4 gauntlet 0.38 at the 3M grid). 2M total ~= 4.6h @ ~120sps.
# SHOWCASE retrain: PPO + from-scratch nature_cnn (over the 84x84 RGB CameraSensor) + LSTM. NO RND.
# Behaviors block is IDENTICAL to m6_pixel.yaml (same nature_cnn/LSTM/hyperparameters) — the showcase reuses the
# proven pixel arm. Three showcase deltas vs M6: (1) a FLAT jump penalty is live (reward.jumpPenalty=0.02, repaired
# in Training_showcase.unity — the base pixel scene predated the field), so the agent jumps only when it helps;
# (2) the env runs COURSE mode over a curated, hand-authored 5-stage challenge course (CourseSpec) instead of
# procedural terrain — one episode per traversal; (3) the target is a FIXED colour (red) every episode.
# The camera obs come from the CameraSensorComponent; the 5-float vector obs (proprioception only) come from
# NavAgent.CollectObservations. Behavior name matches the scene ("NavAgent").
behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32; probe may lower for the heavier visual obs
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # vector obs only (visual obs are already 0..1 pixels)
      hidden_units: 256
      num_layers: 2
      vis_encode_type: nature_cnn   # from-scratch 3-conv Mnih CNN over the 84x84 RGB camera obs
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical to the M6 pixel arm)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 2000000       # provisional (matches m6_pixel); the Phase-5 probe pins it + the real-course sps
    time_horizon: 64
    summary_freq: 20000

# Deterministic PROGRESS curriculum over the curated 5-STAGE course (CourseSpec). The `difficulty` env-param drives
# NavEnvironment's course ladder (it clamps difficulty 0..4 onto CourseSpec's 5 stages). STRUCTURE ramps L0 open room
# -> L4 full gauntlet; the fixed-red 3-goal triad rides on top at every stage. Thresholds are PROVISIONAL (the P1
# probe calibrates them). Same lesson shape as m6_pixel: 5 lessons, the last value-only.
environment_parameters:
  difficulty:
    curriculum:
      - name: L0_open_room
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.05
        value: 0.0
      - name: L1_ramp
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.10
        value: 1.0
      - name: L2_wall
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.15
        value: 2.0
      - name: L3_gap
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.55
        value: 3.0
      - name: L4_gauntlet
        value: 4.0
