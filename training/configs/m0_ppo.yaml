behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      # No memory at M0. The M4 plan adds `memory:` (LSTM) for pure search.
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      # No curiosity at M0. The M4 plan adds a `curiosity:` reward signal.
    keep_checkpoints: 5
    max_steps: 150000
    time_horizon: 64
    summary_freq: 10000
