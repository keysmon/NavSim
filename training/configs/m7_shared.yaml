# M7 shared arm: plate-and-door sacrifice, reward ROUTING is the only lever across the 3 arms (see
# docs/superpowers/specs/2026-07-19-m7-cooperative-sacrifice-design.md sec 4). This arm: trainer_type ppo,
# arm_mode=1.0 -> ArmRouting.Arm.Shared -> the identical +1 outcome (and the per-step time cost) is hand-copied
# into BOTH agents' AddReward. This is naive cooperation: the signal is present but credit is diffuse (no
# counterfactual baseline distinguishes the plate-holder's contribution from the scorer's). World, obs
# (obs = 6-float vector [proprioception 5 + doorOpen] + the M5-style 3-fan rays [tags wall/door/plate/goal/agent]),
# nets (MLP + LSTM, M6 sizes), curriculum, and budget are
# byte-identical to m7_selfish.yaml/m7_poca.yaml except trainer_type + arm_mode (see the header comments
# there) - reward routing is the ONLY structural difference.
behaviors:
  CoopAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # normalizes the vector + ray observations (no visual obs on the coop arms)
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical across all 3 arms)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 4000000       # provisional (equal across arms); Task 7 / probe P5 pins it
    time_horizon: 64
    summary_freq: 20000

# Constant per-arm routing selector (CoopArena.DecodeArm reads env-param "arm_mode"; ArmRouting.Arm.Shared=1).
# Identical param name/shape across all 3 arms; only the value differs.
environment_parameters:
  arm_mode: 1.0

  # Deterministic PROGRESS curriculum (reward-threshold lessons were unusable in M4). Ramps the COOPERATION
  # demand only (spec sec 5): C0 door always open (locomotion + goal-reaching bootstrap) -> C1 door closed,
  # plate beside the doorway (minimal sacrifice) -> C2 plate in the near chamber, far from the doorway (real
  # sacrifice, holder can't see the score happen) -> C3 continuous hold (door re-closes on vacate). Identical
  # across all 3 arms (fair ablation).
  # THRESHOLDS ARE PROBE-RECALIBRATED PLACEHOLDERS: 0.20/0.40/0.65 are the M6/B5 values carried over
  # unvalidated for M7; Task 7 / probe P5 recalibrates them for the sacrifice task before any full run.
  coop_difficulty:
    curriculum:
      - name: C0_door_always_open
        completion_criteria:
          measure: progress
          behavior: CoopAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.20
        value: 0.0
      - name: C1_door_closed_plate_beside_doorway
        completion_criteria:
          measure: progress
          behavior: CoopAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.40
        value: 1.0
      - name: C2_plate_far_near_chamber
        completion_criteria:
          measure: progress
          behavior: CoopAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.65
        value: 2.0
      - name: C3_continuous_hold
        value: 3.0
