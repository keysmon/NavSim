behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 5000000
    time_horizon: 64
    summary_freq: 20000

# Single COLLAPSED difficulty curriculum: one lesson index co-varies agents + arena size + obstacle
# count (NavEnvironment.SetDifficulty via DifficultyMapper). Parallel curricula are forbidden (they
# couple on the shared reward). Thresholds CALIBRATED from a 400k-step probe: L0 baseline ~-2.7 (no
# goals), climbs to ~-1.07 by 400k still rising. A collapsed ladder dips deeper per transition than
# M2's single-axis bumps, so L1/L2 thresholds are set leniently (biased to advance -> reach L3, which
# has no threshold and trains to max_steps). If a lesson stalls below its threshold, lower it.
environment_parameters:
  difficulty:
    curriculum:
      - name: L0_2agents_small
        completion_criteria:
          measure: reward
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: -1.2
        value: 0.0
      - name: L1_4agents_medium
        completion_criteria:
          measure: reward
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: -1.8
        value: 1.0
      - name: L2_6agents_large
        completion_criteria:
          measure: reward
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: -2.2
        value: 2.0
      - name: L3_8agents_max
        value: 3.0
