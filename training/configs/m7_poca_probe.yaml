# THROWAWAY P1 probe (M7 Task 7a) — NOT committed for real use. Fork of m7_poca.yaml with the curriculum
# REPLACED by constants (coop_difficulty=1.0 -> C1_door_closed_plate_beside_doorway, arm_mode=2.0 -> Poca) so
# the run sits directly on the "poca learns C1" gate with no curriculum-advance uncertainty in the way. Budget
# cut to max_steps=700000 (probe-sized) with checkpoint_interval=100000 for a mid-run learning-curve read
# (200k/400k/700k evals). Everything else (hyperparameters/network/reward_signals) byte-identical to
# m7_poca.yaml. See docs/superpowers/sdd/task-7a-report.md for the verdict.
behaviors:
  CoopAgent:
    trainer_type: poca
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # normalizes the vector + ray observations (no visual obs on the coop arms)
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical across all 3 arms)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 700000        # PROBE budget (m7_poca.yaml uses 3000000) — P1 gate only
    time_horizon: 64
    summary_freq: 20000

# Constant per-arm routing selector (CoopArena.DecodeArm reads env-param "arm_mode"; ArmRouting.Arm.Poca=2).
environment_parameters:
  arm_mode: 2.0
  # PROBE: constant C1 (no curriculum) — door closed, plate beside the doorway (minimal sacrifice). The P1 gate
  # asks whether poca can learn C1 AT ALL; curriculum advancement is not under test here.
  coop_difficulty: 1.0
