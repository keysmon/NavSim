# M5 ablation arm: LSTM + NO RND (extrinsic only). Identical to m5_ppo.yaml EXCEPT the reward_signals.rnd
# block is removed. Tests whether the intrinsic exploration drive is necessary (without it, only the sparse
# goal bonus rewards search while the goal is hidden -> the agent may freeze / wander; spec §11).
behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 3000000       # Task-14 FINAL (user 2026-07-14: 3M x 12 runs); EQUAL across all 12
    time_horizon: 64
    summary_freq: 20000

environment_parameters:
  difficulty:
    curriculum:
      - name: L0_open_flat
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.10
        value: 0.0
      - name: L1_behind_walls
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.30
        value: 1.0
      - name: L2_platform_pits
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.50
        value: 2.0
      - name: L3_hidden_elevated_crowded
        value: 3.0
