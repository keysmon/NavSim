# M6 PIXEL arm: PPO + from-scratch nature_cnn (over the 84x84 RGB CameraSensor) + LSTM. NO RND (M5 settled it).
# Perception is the ONLY lever vs the ray arms (m6_ray1 / m6_rayc); LSTM is held ON and identical across arms.
# The camera obs come from the CameraSensorComponent in Training_pixel.unity; the 8-float vector obs
# (proprioception + persistent RGB cue) come from NavAgent.CollectObservations. Behavior name matches the scene.
behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32; probe may lower for the heavier visual obs
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # vector obs only (visual obs are already 0..1 pixels)
      hidden_units: 256
      num_layers: 2
      vis_encode_type: nature_cnn   # from-scratch 3-conv Mnih CNN over the 84x84 RGB camera obs
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical across all 3 arms)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 3000000       # provisional (equal across arms); the Phase-5 probe pins it + the real-terrain sps
    time_horizon: 64
    summary_freq: 20000

# Deterministic PROGRESS curriculum (reward-threshold lessons were unusable in M4). STRUCTURE ramps L0 open/flat
# -> L3 hidden + elevated + crowded + pits; the RGB cue + 3-goal triad ride on top at every level. BREAKPOINTS
# are PLACEHOLDERS (0.10/0.30/0.50) -> the Phase-5 probe re-calibrates them (the pixel arm climbs at its own
# rate; conditional cued matching is harder than M5's reactive nav). Identical across all 3 arms (fair ablation).
environment_parameters:
  difficulty:
    curriculum:
      - name: L0_open_flat
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.20
        value: 0.0
      - name: L1_behind_walls
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.40
        value: 1.0
      - name: L2_platform_pits
        completion_criteria:
          measure: progress
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.65
        value: 2.0
      - name: L3_hidden_elevated_crowded
        value: 3.0
