behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256       # widened from M0's 128 for the richer visual+identity observation
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 5000000
    time_horizon: 64          # bootstraps value on the non-terminating (continuous-respawn) trajectories
    summary_freq: 20000

# Active agent count is curriculum-driven. The arena reads `num_agents` via
# Academy.EnvironmentParameters.GetWithDefault and activates that many agents.
# The `pair` lesson is the trip-wire: it must clear its reward threshold before scaling.
# Reward thresholds CALIBRATED from a 720k-step probe: baseline ~-2.0 (no goals reached),
# 2-agent nav climbs to ~-1.0 by ~700k. Thresholds are set reachable so the curriculum reliably
# advances to the 8-agent "crowd" lesson (final lesson has no threshold -> trains to max_steps).
environment_parameters:
  num_agents:
    curriculum:
      - name: pair
        completion_criteria:
          measure: reward
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: -1.3
        value: 2.0
      - name: small
        completion_criteria:
          measure: reward
          behavior: NavAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: -1.5
        value: 4.0
      - name: crowd
        value: 8.0
