# THROWAWAY M7 CONTROL PROBE (Task 7 diagnosis). Fork of m7_poca_probe2.yaml.
# Purpose: localize the poca-arm fault (pre-update random policy scores Group Reward -0.77 @ 20k,
# then the first gradient updates collapse it below random, pinned at -1.000 flat). This control runs
# the SAME two-stage C0->C1 curriculum probe through the SHARED-PPO arm instead of POCA.
# If shared-PPO learns C0 (reward climbs post-update) -> the fault is POCA-trainer-specific.
# If shared-PPO ALSO collapses post-update -> the fault is arm-independent (arena/reward plumbing).
# Changed from m7_poca_probe2.yaml: trainer_type poca->ppo, arm_mode 2.0->1.0, max_steps 700000->300000
# (the discriminating signal arrives well before 300k). Everything else byte-identical.
behaviors:
  CoopAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # normalizes the vector + ray observations (no visual obs on the coop arms)
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical across all 3 arms)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 300000        # PROBE budget (control run) — discriminating signal arrives well before this
    time_horizon: 64
    summary_freq: 20000

# Constant per-arm routing selector (CoopArena.DecodeArm reads env-param "arm_mode"; ArmRouting.Arm.Shared=1).
environment_parameters:
  arm_mode: 1.0
  # Same ladder as m7_poca_probe2.yaml: C0 un-freeze (door always open, locomotion + goal-reaching bootstrap)
  # -> C1 (the gate). progress threshold 0.30 * 300k = ~90k steps of C0, then ~210k of C1.
  coop_difficulty:
    curriculum:
      - name: C0_door_always_open
        completion_criteria:
          measure: progress
          behavior: CoopAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.30
        value: 0.0
      - name: C1_door_closed_plate_beside_doorway
        value: 1.0
