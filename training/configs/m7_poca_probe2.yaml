# THROWAWAY P1 re-probe (M7 Task 7a, attempt 2 — the SINGLE sanctioned re-probe). Fork of m7_poca.yaml.
# Controller diagnosis of attempt 1 (m7_poca_probe.yaml): pinning coop_difficulty=1.0 from step 0 skipped the
# spec's C0 un-freeze rung -> the flat zero-success floor was the expected cold-start signature. This config
# restores a TWO-lesson ladder: C0 (door always open; goal-distance bootstrap engaged) until progress 0.30
# (~210k of the 700k budget), then C1 (door closed, plate beside doorway) for the remaining ~490k.
# Budget max_steps=700000, checkpoint_interval=100000 for the 200k/400k/700k curve read. arm_mode constant 2.0
# (Poca). All hyperparameters / network / reward_signals byte-identical to m7_poca.yaml.
behaviors:
  CoopAgent:
    trainer_type: poca
    hyperparameters:
      batch_size: 2048       # divisible by sequence_length (64) -> 32
      buffer_size: 20480     # divisible by sequence_length (64) -> 320
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true        # normalizes the vector + ray observations (no visual obs on the coop arms)
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128     # LSTM hidden state (held ON, identical across all 3 arms)
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 700000        # PROBE budget (m7_poca.yaml uses 3000000) — P1 gate only
    time_horizon: 64
    summary_freq: 20000

# Constant per-arm routing selector (CoopArena.DecodeArm reads env-param "arm_mode"; ArmRouting.Arm.Poca=2).
environment_parameters:
  arm_mode: 2.0
  # RE-PROBE ladder: C0 un-freeze (door always open, locomotion + goal-reaching bootstrap) -> C1 (the gate).
  # progress threshold 0.30 * 700k = ~210k steps of C0, then ~490k of C1.
  coop_difficulty:
    curriculum:
      - name: C0_door_always_open
        completion_criteria:
          measure: progress
          behavior: CoopAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.30
        value: 0.0
      - name: C1_door_closed_plate_beside_doorway
        value: 1.0
