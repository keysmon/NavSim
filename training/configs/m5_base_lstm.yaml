# SHARED BOOTSTRAP BASE (LSTM) — THROWAWAY, local-only. No-RND, pinned-L0 L0-competence base that the LSTM arms
# (primary, nornd) --initialize-from so they don't cold-start-freeze. NO RND (RND inits fresh in the arms). Clean
# shipped build (real L0 5.5-9u). Pairs with m5_base_nolstm.yaml (same, minus the memory block) for nolstm/baseline.
behaviors:
  NavAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 600000
    time_horizon: 64
    summary_freq: 10000
environment_parameters:
  difficulty: 0.0
